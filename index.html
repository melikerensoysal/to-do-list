<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <span class="icon">✓</span>
                <h1>My Tasks</h1>
            </div>
            <p class="date" id="current-date"></p>
        </header>

        <form id="todo-form">
            <input type="text" id="task-input" placeholder="What do you need to do" autocomplete="off">
            <button type="submit" id="add-btn">+</button>
        </form>

        <div class="filters">
            <span class="active">All</span>
            <span>Active</span>
            <span>Completed</span>
        </div>

        <ul id="task-list">
            <li id="empty-state" class="empty-state visible">
                <i class="fa-solid fa-clipboard-list empty-icon"></i>
                <p>No tasks here yet</p>
            </li>
        </ul>

        <footer>
            <span id="items-left">0 items left</span>
            <span id="clear-completed">Clear Completed</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
